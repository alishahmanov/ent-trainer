<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT Trainer - Тест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timer-box" id="timer">--:--</div>
        <h3 id="test-title-header">Загрузка...</h3>
        
        <div class="nav-grid" id="nav-grid"></div>

        <div id="question-container"></div>

        <div class="navigation-tools">
            <button class="btn" id="btn-prev" onclick="changeQuestion(-1)" style="background-color: #64748b;">Назад</button>
            <button class="btn" id="btn-next" onclick="changeQuestion(1)">Вперед</button>
            <button class="btn" id="btn-finish" onclick="finishTest()" style="background-color: var(--danger); display: none;">Завершить тест</button>
        </div>
    </div>

    <script>
        let testData = null;
        let currentQuestionIndex = 0;
        let userAnswers = {}; 
        let timerInterval = null;
        let attemptId = null; // Уникальный ID попытки

        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('id');

        async function initTest() {
            try {
                const response = await fetch(`tests/${testId}.json`);
                testData = await response.json();
                
                // Генерируем уникальный ID для этой попытки
                attemptId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                document.getElementById('test-title-header').textContent = testData.title;
                
                startTimer(testData.timeLimit * 60);
                renderNavigation();
                renderQuestion();
            } catch (e) {
                alert('Ошибка загрузки теста');
                window.location.href = 'index.html';
            }
        }

        function startTimer(secondsLeft) {
            timerInterval = setInterval(() => {
                if (secondsLeft <= 0) { finishTest(); return; }
                secondsLeft--;
                const mins = Math.floor(secondsLeft / 60);
                const secs = secondsLeft % 60;
                document.getElementById('timer').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);
        }

        function renderNavigation() {
            const grid = document.getElementById('nav-grid');
            grid.innerHTML = testData.questions.map((q, idx) => {
                const isAnswered = userAnswers[q.id] !== undefined && 
                                 (Array.isArray(userAnswers[q.id]) ? userAnswers[q.id].length > 0 : true);
                const statusClass = isAnswered ? 'answered' : '';
                const activeClass = idx === currentQuestionIndex ? 'active' : '';
                return `<div class="nav-item ${statusClass} ${activeClass}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
            }).join('');
        }

        // Функция экранирования ТОЛЬКО для блоков кода
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderQuestion() {
            const q = testData.questions[currentQuestionIndex];
            const container = document.getElementById('question-container');
            const isMultiple = q.type === 'multiple';
            
            let optionsHtml = q.options.map((option, index) => {
                let isChecked = false;
                if (isMultiple) {
                    isChecked = (userAnswers[q.id] || []).includes(index);
                } else {
                    isChecked = userAnswers[q.id] === index;
                }

                // УБРАЛИ escapeHtml отсюда, чтобы HTML теги рендерились корректно
                return `
                    <label class="option-label">
                        <input type="${isMultiple ? 'checkbox' : 'radio'}" 
                               name="answer" 
                               value="${index}" 
                               ${isChecked ? 'checked' : ''} 
                               onchange="saveAnswer('${q.id}', ${index}, ${isMultiple})">
                        ${option}
                    </label>
                `;
            }).join('');

            const hasCode = q.question.includes('\n') || q.question.includes('for ') || q.question.includes('while') || q.question.includes('{');
            
            // Сборка блока картинки (Подход 1 для Математики)
            const imageHtml = q.image ? `<div style="text-align: center; margin-bottom: 20px;"><img src="${q.image}" style="max-width: 100%; border-radius: 8px; border: 1px solid #e2e8f0;"></div>` : '';

            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span style="background: #fef3c7; color: #b45309; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold;">
                        ${q.subject} ${isMultiple ? '(Множественный выбор)' : ''}
                    </span>
                </div>
                
                ${imageHtml}
                
                ${hasCode 
                    ? `<pre class="code-block">${escapeHtml(q.question)}</pre>` 
                    : `<h2 style="margin-bottom: 20px;">${q.question}</h2>`
                }
                
                <div class="options">${optionsHtml}</div>
            `;

            renderNavigation();
            updateButtons();
        }

        function saveAnswer(questionId, optionIndex, isMultiple) {
            if (isMultiple) {
                if (!userAnswers[questionId]) userAnswers[questionId] = [];
                const idx = userAnswers[questionId].indexOf(optionIndex);
                if (idx > -1) userAnswers[questionId].splice(idx, 1);
                else userAnswers[questionId].push(optionIndex);
            } else {
                userAnswers[questionId] = optionIndex;
            }
            renderNavigation();
        }

        function jumpToQuestion(idx) { currentQuestionIndex = idx; renderQuestion(); }
        function changeQuestion(dir) { currentQuestionIndex += dir; renderQuestion(); }

        function updateButtons() {
            document.getElementById('btn-prev').style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
            const isLast = currentQuestionIndex === testData.questions.length - 1;
            document.getElementById('btn-next').style.display = isLast ? 'none' : 'inline-block';
            document.getElementById('btn-finish').style.display = isLast ? 'inline-block' : 'none';
        }

        function finishTest() {
            clearInterval(timerInterval);
            
            const currentResult = {
                attemptId: attemptId, // Добавляем уникальный ID
                testId: testId,
                title: testData.title,
                questions: testData.questions,
                userAnswers: userAnswers,
                date: new Date().toLocaleString('ru-RU')
            };

            localStorage.setItem('last_test_result', JSON.stringify(currentResult));

            let testHistory = localStorage.getItem('ent_trainer_history');
            if (!testHistory) {
                testHistory = [];
            } else {
                testHistory = JSON.parse(testHistory);
            }

            // Проверяем, не добавлена ли уже такая попытка (по attemptId)
            const isDuplicate = testHistory.some(attempt => attempt.attemptId === attemptId);
            
            if (!isDuplicate) {
                testHistory.push(currentResult);
                localStorage.setItem('ent_trainer_history', JSON.stringify(testHistory));
            }

            window.location.href = 'result.html';
        }

        initTest();
    </script>
</body>
</html>
