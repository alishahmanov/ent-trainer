<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT Trainer - Главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">ENT Trainer </h1>
        <p style="text-align: center; color: #64748b;">Платформа для подготовки к ЕНТ без лишних забот</p>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        
        <h2>Доступные варианты</h2>
        <div id="test-list">
            <p>Загрузка доступных тестов...</p>
        </div>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0;">

        <div id="analytics-section" style="display: none; background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Твоя аналитика прогресса 📈</h2>
                <button onclick="clearHistory()" style="background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;">
                    Сбросить историю
                </button>
            </div>
            
            <div style="font-size: 20px; margin-bottom: 20px;">
                Общий средний результат: <b id="avg-global-percent" style="color: var(--primary);">0%</b>
            </div>

            <div id="subject-progress-bars"></div>
        </div>

        <h2>История твоих попыток 📊</h2>
        <div id="history-container">
            <p style="color: #64748b;">Ты еще не проходил тесты. Все твои результаты появятся здесь!</p>
        </div>
    </div>

    <script>
        const fallbackTests = [
            { id: "variant-9", title: "Вариант 9", subjects: ["Математика", "Информатика"], timeLimit: 80 }
        ];

        async function loadTests() {
            try {
                const response = await fetch('tests/list.json');
                const tests = await response.json();
                renderTests(tests);
            } catch (error) {
                renderTests(fallbackTests);
            }
        }

        function renderTests(tests) {
            const container = document.getElementById('test-list');
            if(!tests || tests.length === 0) {
                container.innerHTML = '<p>Доступных вариантов пока нет.</p>';
                return;
            }
            container.innerHTML = tests.map(test => `
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0;">
                    <div>
                        <h3 style="margin: 0 0 10px 0;">${test.title}</h3>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px;">
                            ${test.subjects.map(sub => `<span style="background: #e0f2fe; color: #0369a1; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">${sub}</span>`).join('')}
                        </div>
                        <span style="color: #64748b; font-size: 14px;">⏱ Время на всё: ${test.timeLimit} минут</span>
                    </div>
                    <a href="test.html?id=${test.id}" class="btn">Начать тест</a>
                </div>
            `).join('');
        }

        function loadHistoryAndAnalytics() {
            const historyRaw = localStorage.getItem('ent_trainer_history');
            const container = document.getElementById('history-container');
            const analyticsSection = document.getElementById('analytics-section');

            if (!historyRaw) return;

            let history = JSON.parse(historyRaw);
            
            // ТОТАЛЬНАЯ ФИЛЬТРАЦИЯ: Удаляем пустышки и незаполненные тесты прямо из памяти
            history = history.filter(attempt => {
                if (!attempt || !attempt.questions || !attempt.userAnswers || !attempt.date) return false;
                // Если вообще нет ответов (длина объекта ключей равна 0) — это мусор, удаляем
                if (Object.keys(attempt.userAnswers).length === 0) return false;
                return true;
            });

            // Удаляем дубликаты по attemptId (новая система)
            const seenIds = new Set();
            history = history.filter(attempt => {
                if (attempt.attemptId && seenIds.has(attempt.attemptId)) return false;
                if (attempt.attemptId) seenIds.add(attempt.attemptId);
                return true;
            });

            // Синхронизируем очищенную историю обратно в LocalStorage, чтобы вырезать мусор навсегда
            localStorage.setItem('ent_trainer_history', JSON.stringify(history));

            if (history.length === 0) {
                analyticsSection.style.display = 'none';
                container.innerHTML = '<p style="color: #64748b;">Ты еще не проходил тесты. Все твои результаты появятся здесь!</p>';
                return;
            }

            analyticsSection.style.display = 'block';

            let totalGlobalScore = 0;
            let totalGlobalMax = 0;
            const globalSubjectStats = {};
            const uniqueHistory = [];
            const seenDisplayIds = new Set();

            history.forEach(item => {
                // Используем attemptId для дедупликации (если есть), иначе используем дату
                const id = item.attemptId || item.date;
                if (!seenDisplayIds.has(id)) {
                    seenDisplayIds.add(id);
                    uniqueHistory.push(item);
                }
            });

            const reversedHistory = [...uniqueHistory].reverse();

            let historyHtml = `
                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left;">
                    <thead>
                        <tr style="background: #f1f5f9; border-bottom: 2px solid #e2e8f0;">
                            <th style="padding: 12px;">Дата и время</th>
                            <th style="padding: 12px;">Название теста</th>
                            <th style="padding: 12px;">Набранный балл</th>
                            <th style="padding: 12px;">Процент</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            reversedHistory.forEach(attempt => {
                let attemptScore = 0;
                let attemptMax = 0;

                attempt.questions.forEach(q => {
                    const userAns = attempt.userAnswers[q.id];
                    const correctAns = q.answer;
                    let maxQScore = q.type === 'multiple' ? 2 : 1;
                    
                    let questionScore = 0;
                    if (q.type === 'multiple') {
                        const userSet = new Set(Array.isArray(userAns) ? userAns : []);
                        const correctSet = new Set(Array.isArray(correctAns) ? correctAns : []);
                        const missed = [...correctSet].filter(x => !userSet.has(x)).length;
                        const extra = [...userSet].filter(x => !correctSet.has(x)).length;
                        const totalErrors = missed + extra;

                        if (totalErrors === 0) questionScore = 2;
                        else if (totalErrors === 1) questionScore = 1;
                    } else {
                        if (userAns !== undefined && userAns === correctAns) questionScore = 1;
                    }

                    attemptScore += questionScore;
                    attemptMax += maxQScore;

                    if (!globalSubjectStats[q.subject]) {
                        globalSubjectStats[q.subject] = { score: 0, max: 0 };
                    }
                    globalSubjectStats[q.subject].score += questionScore;
                    globalSubjectStats[q.subject].max += maxQScore;
                });

                totalGlobalScore += attemptScore;
                totalGlobalMax += attemptMax;

                const percent = Math.round((attemptScore / attemptMax) * 100) || 0;

                historyHtml += `
                    <tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 12px; color: #64748b; font-size: 14px;">${attempt.date}</td>
                        <td style="padding: 12px; font-weight: 500;">${attempt.title}</td>
                        <td style="padding: 12px; font-weight: bold; color: #2563eb;">${attemptScore} из ${attemptMax}</td>
                        <td style="padding: 12px;"><span style="background: #dcfce7; color: #15803d; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: bold;">${percent}%</span></td>
                    </tr>
                `;
            });

            historyHtml += `</tbody></table>`;
            container.innerHTML = historyHtml;

            const globalPercent = Math.round((totalGlobalScore / totalGlobalMax) * 100) || 0;
            document.getElementById('avg-global-percent').textContent = `${globalPercent}%`;

            let progressBarsHtml = '';
            for (const sub in globalSubjectStats) {
                const subPercent = Math.round((globalSubjectStats[sub].score / globalSubjectStats[sub].max) * 100) || 0;
                progressBarsHtml += `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #475569;">
                            <span>${sub}</span>
                            <span>${subPercent}% (${globalSubjectStats[sub].score}/${globalSubjectStats[sub].max} б.)</span>
                        </div>
                        <div style="background: #e2e8f0; width: 100%; height: 10px; border-radius: 5px; overflow: hidden;">
                            <div style="background: #2563eb; width: ${subPercent}%; height: 100%; border-radius: 5px; transition: width 0.5s ease-in-out;"></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('subject-progress-bars').innerHTML = progressBarsHtml;
        }

        function clearHistory() {
            if (confirm('Ты уверен, что хочешь очистить всю историю попыток и обнулить графики?')) {
                localStorage.removeItem('ent_trainer_history');
                localStorage.removeItem('last_test_result');
                window.location.reload();
            }
        }

        window.onload = function() {
            loadTests();
            loadHistoryAndAnalytics();
        };
    </script>
</body>
</html>
